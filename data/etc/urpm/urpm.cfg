# urpm-ng main configuration
#
# Settings here are the base defaults. Drop-in overrides go in
# /etc/urpm/conf.d/*.cfg (loaded alphabetically after this file).
#
# Boolean values: true/false, yes/no, 1/0, on/off

[resolver]
# Automatically install Recommended packages (like DNF default).
install_recommends = true

[download]
# Maximum number of simultaneous downloads.
parallel = 4

# Default HTTP timeout in seconds.
timeout = 30

# Minimum number of servers to retrieve per media during setup.
min_servers = 2
