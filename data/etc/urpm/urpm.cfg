# urpm-ng main configuration
#
# Settings here are the base defaults. Drop-in overrides go in
# /etc/urpm/conf.d/*.cfg (loaded alphabetically after this file).
#
# Boolean values: true/false, yes/no, 1/0, on/off

[resolver]
# Automatically install Recommended packages (like DNF default).
install_recommends = true

[download]
# Maximum number of simultaneous downloads.
parallel = 4

# Default HTTP timeout in seconds.
timeout = 30

# Minimum number of servers to retrieve per media during setup.
min_servers = 2

# Maximum simultaneous downloads from a single server (guard-rail).
# Many mirrors limit concurrent connections per client to 2-3.
max_per_server = 2

[transaction]
# All commands use smart sync by default: the parent process waits for
# package extraction, then returns while post-install triggers (file
# triggers, %posttrans) continue in the background.
#
# Use --sync on the command line to force full synchronous execution
# (waits for everything including triggers).  Full sync is also forced
# automatically when packages requiring a system reboot are detected
# (kernel, glibc, systemd, ...).

[daemon]
# Network interfaces used for P2P discovery broadcasts.
#
#   all              broadcast on every active interface with a broadcast
#                    address (loopback excluded) — default
#   eth0,vboxnet0    comma-separated list to restrict broadcasts to those
#                    interfaces only
#
# Useful when the machine is multi-homed (e.g. LAN + VirtualBox host-only)
# and peers live on a non-default-route network.
discovery_interfaces = all
