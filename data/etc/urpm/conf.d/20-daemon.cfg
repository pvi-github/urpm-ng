# urpmd background scheduler — automatic media refresh
#
# When urpmd is running, it periodically reaches out to mirrors to
# keep things in sync.  This file lets you turn each periodic job
# off (or just slow it down) when you want to control the timing
# yourself.
#
# Every option below is COMMENTED OUT and shows the built-in default.
# Uncomment a line to override it.
#
# ``urpm media update`` invoked manually is NEVER affected by these
# settings — it always runs when you ask it to.

[daemon]

# Periodic metadata refresh (HTTP HEAD on synthesis files).
#
# When false:
#   * the hourly synthesis freshness check is skipped
#   * the immediate sync triggered after resume from suspend is
#     ALSO skipped (one switch, one behaviour — you opt out of
#     all automatic metadata traffic, full stop)
#
# Use ``urpm media update`` whenever you want a refresh.
#
# auto_update_metadata = true

# Pre-download RPMs for pending updates in the background.
#
# When false: updates are still detected (if auto_update_metadata
# is true) but the RPMs themselves are only fetched when you run
# ``urpm upgrade``.
#
# auto_predownload = true

# Replicate media flagged ``replication_policy=full``.
#
# Only relevant if you mirror full media locally.  When false,
# already-replicated content stays usable but no new replication
# rounds are launched.
#
# auto_replication = true

# Refresh per-server freshness dates (lightweight probe).
#
# Used to rank mirrors for download priority.  Disable to silence
# every routine background request urpmd makes.
#
# auto_fetch_server_dates = true

# Metadata check interval, in seconds.
#
# Built-in default is 3600 (1 hour) in production.  An adaptive
# per-media schedule sits on top of this value, so the actual cadence
# may stretch further for media that rarely change.  Raise this to
# slow refreshes without disabling them entirely.
#
# Ignored when auto_update_metadata is false.
#
# metadata_interval = 3600
