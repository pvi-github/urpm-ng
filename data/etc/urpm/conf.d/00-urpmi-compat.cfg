# Backward compatibility with genhdlist2/urpmi synthesis files.
#
# genhdlist2 maps RPM Recommends to @suggests@ in synthesis.
# This flag tells the resolver to treat them as Recommends so they
# are automatically installed — matching urpmi behaviour.
#
# When ALL your media are generated by urpm genmedia (which preserves
# the Recommends/Suggests distinction correctly), remove this file
# or set the value to false.

[resolver]
suggests_as_recommends = true
