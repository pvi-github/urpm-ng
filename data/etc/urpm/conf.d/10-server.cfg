# Server selection and geographic filtering.
#
# Drop-in override: copy this file or create a higher-numbered file
# (e.g. 99-local-server.cfg) in /etc/urpm/conf.d/ to customise.

[server]
# Allow automatic addition of mirror servers.
#
# When false, only servers explicitly added by the user (urpm server add)
# are used.  Commands like urpm init, urpm media autoconfig,
# urpm server autoconf, and background pool expansion will not add
# new servers from the mirrorlist.
#
# auto_add = true

# Geographic filtering for mirror selection.
#
# Continent codes: EU, NA, SA, AS, AF, OC
# Country codes: ISO 3166 two-letter (FR, DE, UA, US, ...)
#
# Whitelist and blacklist are mutually exclusive per level —
# if both are set, whitelist wins.  A mirror must pass BOTH
# the continent AND country filter.
#
# Examples:
#   continent_whitelist = EU          # Only European mirrors
#   country_blacklist = UA, RU        # Exclude specific countries
#   continent_whitelist = EU          # European mirrors...
#   country_blacklist = UA            # ...except Ukraine
#
# continent_blacklist =
# continent_whitelist =
# country_blacklist =
# country_whitelist =
